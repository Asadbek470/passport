<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Passport OS 5.0</title>
    
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --ios-bg: #050505;
            --glass: rgba(255, 255, 255, 0.08);
            --blur: blur(25px);
            --accent: #0A84FF;
            --gold: #D4AF37;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--ios-bg); color: white;
            height: 100%; width: 100%; overflow: hidden;
        }

        #app { width: 100%; height: 100%; display: flex; flex-direction: column; }

        .screen { display: none; flex-direction: column; height: 100%; padding: 20px; overflow-y: auto; }
        .screen.active { display: flex; }

        /* Дизайн карточки Pro */
        .card {
            min-height: 240px; border-radius: 20px; padding: 22px;
            position: relative; overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.15);
            background-size: cover;
            margin-bottom: 20px;
        }

        /* Водяной знак */
        .watermark {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 5rem; font-weight: 900;
            opacity: 0.04; pointer-events: none; white-space: nowrap;
        }

        .passport { background: linear-gradient(145deg, #5e0b15, #2e0509); }
        .travel { background: linear-gradient(145deg, #1a3a5f, #0a1a2f); }
        .driver { background: linear-gradient(145deg, #2c3e50, #000); }

        .card-header { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; }
        .system-name { font-size: 0.7rem; letter-spacing: 2px; color: var(--gold); font-weight: bold; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .label { font-size: 0.6rem; text-transform: uppercase; color: rgba(255,255,255,0.5); display: block; }
        .value { font-size: 0.95rem; font-weight: 600; color: #fff; }
        .value.name { font-size: 1.2rem; margin-bottom: 5px; }

        .qr-wrap {
            position: absolute; bottom: 18px; right: 18px;
            background: #fff; padding: 5px; border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Кнопки и поля */
        .glass-btn {
            background: var(--accent); color: white; border: none;
            padding: 18px; border-radius: 15px; font-weight: 700; width: 100%;
            margin-top: 10px; box-shadow: 0 10px 20px rgba(10, 132, 255, 0.3);
        }

        .input-group { background: var(--glass); border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        input { width: 100%; background: none; border: none; color: #fff; font-size: 1rem; border-bottom: 1px solid #333; padding: 8px 0; margin-bottom: 10px; }

        /* Таб-бар */
        .tabs {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: rgba(10, 10, 10, 0.9); backdrop-filter: var(--blur);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;
        }
        .tab { color: #555; text-align: center; font-size: 0.65rem; transition: 0.3s; }
        .tab.active { color: var(--accent); transform: translateY(-3px); }
        .tab img { width: 28px; height: 28px; margin-bottom: 4px; display: block; margin-left: auto; margin-right: auto; }

        #scanner-modal { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:1000; display:none; flex-direction:column; }
    </style>
</head>
<body>

<div id="app">
    <section id="auth-screen" class="screen active">
        <div style="margin-top: auto; padding-bottom: 40px;">
            <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Passport <span style="color:var(--accent)">OS</span></h1>
            <p style="color:#666; margin-bottom: 30px;">Система верификации личности 5.0</p>
            <div class="input-group">
                <input type="text" id="u-login" placeholder="Имя пользователя">
                <input type="password" id="u-pass" placeholder="Пароль">
                <button class="glass-btn" onclick="System.auth()">Авторизоваться</button>
            </div>
        </div>
    </section>

    <section id="form-screen" class="screen">
        <h2>Регистрация в базе</h2>
        <div class="input-group">
            <label class="label">Фамилия Имя Отчество</label>
            <input type="text" id="p-full-name" placeholder="Иванов Иван Иванович">
            <label class="label">Дата рождения</label>
            <input type="date" id="p-bday">
            <label class="label">Образец подписи</label>
            <input type="text" id="p-signature" placeholder="Напишите кратко (напр. I.Ivanov)">
            <button class="glass-btn" onclick="System.saveProfile()">Выпустить профиль</button>
        </div>
    </section>

    <section id="main-screen" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 id="tab-title">Цифровой Паспорт</h2>
            <div onclick="System.openScanner()" style="font-size:24px; cursor:pointer; background:var(--glass); padding:10px; border-radius:50%">🔍</div>
        </div>
        
        <div id="doc-view"></div>

        <div class="tabs">
            <div class="tab active" onclick="System.switch('passport', this)">🏠<br>Паспорт</div>
            <div class="tab" onclick="System.switch('travel', this)">✈️<br>Загран</div>
            <div class="tab" onclick="System.switch('driver', this)">🚗<br>Права</div>
        </div>
    </section>

    <div id="scanner-modal">
        <div id="reader" style="flex:1"></div>
        <button class="glass-btn" style="border-radius:0; background:#222;" onclick="System.closeScanner()">Закрыть сканер</button>
    </div>
</div>

<script>
const System = {
    user: null,
    db: JSON.parse(localStorage.getItem('p5_db')) || { users: [] },

    init() { localStorage.setItem('p5_db', JSON.stringify(this.db)); },

    auth() {
        const u = document.getElementById('u-login').value;
        const p = document.getElementById('u-pass').value;
        if(!u || !p) return alert("Введите данные");

        let user = this.db.users.find(x => x.username === u);
        if(!user) {
            user = { username: u, password: p, profile: null, docs: [] };
            this.db.users.push(user);
            this.init();
        }
        if(user.password !== p) return alert("Ошибка доступа");
        
        this.user = user;
        this.renderView();
    },

    saveProfile() {
        const name = document.getElementById('p-full-name').value;
        const bday = document.getElementById('p-bday').value;
        const sign = document.getElementById('p-signature').value;
        if(!name || !bday) return alert("Заполните поля");

        this.user.profile = { name, bday, sign };
        this.init();
        this.renderView();
    },

    renderView() {
        if(!this.user.profile) return this.show('form-screen');
        this.show('main-screen');
        this.draw('passport');
    },

    show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    },

    switch(type, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        this.draw(type);
    },

    draw(type) {
        const container = document.getElementById('doc-view');
        const doc = this.user.docs.find(d => d.type === type);
        
        if(!doc) {
            container.innerHTML = `
                <div class="input-group" style="text-align:center; padding:40px 20px;">
                    <p style="color:#888">Документ не найден</p>
                    <button class="glass-btn" onclick="System.createDoc('${type}')">Выпустить ${type}</button>
                </div>`;
            return;
        }

        container.innerHTML = `
            <div class="card ${type}">
                <div class="watermark">ORIGINAL</div>
                <div class="card-header">
                    <div class="system-name">PASSPORT SYSTEM v5.0</div>
                    <div style="font-size:0.6rem; color:var(--gold)">STRICT SECURITY</div>
                </div>
                <div class="value name">${this.user.profile.name}</div>
                <div class="info-grid">
                    <div><span class="label">ID Номер</span><span class="value">${doc.id}</span></div>
                    <div><span class="label">Дата рождения</span><span class="value">${this.user.profile.bday}</span></div>
                    <div><span class="label">Выдан</span><span class="value">${doc.issued}</span></div>
                    <div><span class="label">Срок до</span><span class="value" style="color:var(--gold)">${doc.expiry}</span></div>
                </div>
                <div style="margin-top:15px;">
                    <span class="label">Подпись владельца</span>
                    <div style="font-family:cursive; font-size:1.2rem; color:rgba(255,255,255,0.8)">${this.user.profile.sign}</div>
                </div>
                <div class="qr-wrap"><canvas id="canvas-${doc.id}"></canvas></div>
            </div>
            <p style="text-align:center; color:#444; font-size:0.7rem;">Цифровая копия защищена криптографией</p>
        `;
        setTimeout(() => QRCode.toCanvas(document.getElementById(`canvas-${doc.id}`), doc.id, { width: 80, margin: 0 }), 50);
    },

    createDoc(type) {
        const id = 'PS-' + Math.random().toString(36).substr(2, 8).toUpperCase();
        const now = new Date();
        const exp = new Date(); exp.setFullYear(now.getFullYear() + 10);

        this.user.docs.push({
            id, type, 
            issued: now.toLocaleDateString(), 
            expiry: exp.toLocaleDateString()
        });
        this.init();
        this.draw(type);
    },

    openScanner() {
        document.getElementById('scanner-modal').style.display = 'flex';
        this.scanner = new Html5Qrcode("reader");
        this.scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
            (res) => { this.verify(res); this.closeScanner(); }
        );
    },

    closeScanner() {
        if(this.scanner) this.scanner.stop().then(() => {
            document.getElementById('scanner-modal').style.display = 'none';
        });
    },

    verify(scannedId) {
        // Загружаем актуальную базу перед проверкой
        const db = JSON.parse(localStorage.getItem('p5_db'));
        let foundUser = null;
        let foundDoc = null;

        for(let u of db.users) {
            let d = u.docs.find(x => x.id === scannedId);
            if(d) { foundUser = u; foundDoc = d; break; }
        }

        if(foundDoc) {
            alert(`✅ СИСТЕМА ВЕРИФИКАЦИИ:\n\nСТАТУС: ПОДЛИННЫЙ\nВЛАДЕЛЕЦ: ${foundUser.profile.name}\nТИП: ${foundDoc.type.toUpperCase()}\nСРОК ДЕЙСТВИЯ: до ${foundDoc.expiry}\n\nПроверка завершена успешно.`);
        } else {
            alert(`❌ ВНИМАНИЕ: ПОДДЕЛКА!\n\nID [${scannedId}] не найден в базе данных.\nДокумент недействителен!`);
        }
    }
};

System.init();
</script>
</body>
</html>
