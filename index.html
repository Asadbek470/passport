<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Passport System 4.0 | Fixed</title>
    
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --ios-bg: #000000;
            --glass: rgba(255, 255, 255, 0.1);
            --blur: blur(20px);
            --accent: #0A84FF;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body, html {
            margin: 0; padding: 0; 
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--ios-bg); color: white;
            height: 100%; width: 100%; overflow: hidden;
        }

        #app {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            position: relative;
        }

        /* Адаптивные экраны */
        .screen {
            display: none; flex-direction: column;
            height: 100%; padding: 20px; padding-bottom: 100px;
            overflow-y: auto; -webkit-overflow-scrolling: touch;
        }
        .screen.active { display: flex; }

        /* Glassmorphism */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; padding: 18px; margin-bottom: 15px;
        }

        h1 { font-size: 1.8rem; margin-bottom: 5px; }
        input, select {
            width: 100%; background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1); padding: 15px;
            border-radius: 12px; color: white; margin-bottom: 10px; font-size: 16px; /* 16px предотвращает зум на iOS */
        }

        button {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: var(--accent); color: white; font-weight: 600; font-size: 1rem;
        }

        /* Исправленные карточки Wallet */
        .docs-container { display: flex; flex-direction: column; gap: 15px; }
        
        .card {
            min-height: 200px; border-radius: 16px; padding: 20px;
            position: relative; overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            background-size: cover;
        }

        .passport { background: linear-gradient(135deg, #7b0d1e, #b91313); }
        .travel { background: linear-gradient(135deg, #1e3c72, #2a5298); }
        .driver { background: linear-gradient(135deg, #333, #000); }

        .card-label { font-size: 0.65rem; text-transform: uppercase; opacity: 0.7; }
        .card-val { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
        
        .qr-box {
            position: absolute; bottom: 15px; right: 15px;
            background: white; padding: 4px; border-radius: 6px;
            width: 70px; height: 70px;
        }

        /* Таб-бар с учетом безопасных зон iPhone */
        .tab-bar {
            position: absolute; bottom: 0; width: 100%;
            height: calc(70px + var(--safe-bottom));
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: var(--blur);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 0.5px solid rgba(255,255,255,0.1);
            padding-bottom: var(--safe-bottom);
            z-index: 100;
        }
        .tab-item { color: #888; font-size: 0.7rem; text-align: center; flex: 1; }
        .tab-item.active { color: var(--accent); }
        .tab-item span { font-size: 22px; display: block; }

        /* Сканер на весь экран */
        #scanner-view {
            position: fixed; top:0; left:0; right:0; bottom:0;
            background: #000; z-index: 999; display: none;
        }
    </style>
</head>
<body>

<div id="app">
    <section id="auth-screen" class="screen active">
        <div style="margin-top: auto;">
            <h1>Passport 4.0</h1>
            <p style="color:#888; margin-bottom: 20px;">Цифровой профиль</p>
            <div class="glass-panel">
                <input type="text" id="u-name" placeholder="Логин">
                <input type="password" id="u-pass" placeholder="Пароль">
                <button onclick="App.auth()">Войти / Создать</button>
            </div>
        </div>
    </section>

    <section id="profile-screen" class="screen">
        <h2>Анкета</h2>
        <div class="glass-panel">
            <input type="text" id="p-last" placeholder="Фамилия">
            <input type="text" id="p-first" placeholder="Имя">
            <input type="date" id="p-date">
            <input type="text" id="p-sign" placeholder="Текст подписи">
            <button onclick="App.saveProfile()">Завершить</button>
        </div>
    </section>

    <section id="main-screen" class="screen">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 id="view-title">Wallet</h2>
            <div onclick="App.openScanner()" style="font-size:26px;">🔍</div>
        </header>
        <div id="docs-list" class="docs-container"></div>
        
        <nav class="tab-bar">
            <div class="tab-item active" onclick="App.tab('passport', this)"><span>📇</span>Паспорт</div>
            <div class="tab-item" onclick="App.tab('travel', this)"><span>✈️</span>Загран</div>
            <div class="tab-item" onclick="App.tab('driver', this)"><span>🚗</span>Права</div>
        </nav>
    </section>

    <div id="scanner-view">
        <div id="reader" style="width: 100%; height: 80vh;"></div>
        <button onclick="App.closeScanner()" style="background:red; border-radius:0;">Закрыть</button>
    </div>
</div>

<script>
const App = {
    currentUser: null,
    db: { users: [] },

    init() {
        // Загружаем актуальную базу
        const data = localStorage.getItem('p4_db');
        if (data) this.db = JSON.parse(data);
    },

    save() {
        localStorage.setItem('p4_db', JSON.stringify(this.db));
    },

    auth() {
        this.init(); // Обновляем перед входом
        const u = document.getElementById('u-name').value;
        const p = document.getElementById('u-pass').value;
        if(!u || !p) return;

        let user = this.db.users.find(x => x.username === u);
        if(!user) {
            user = { username: u, password: p, profile: null, docs: [] };
            this.db.users.push(user);
            this.save();
        }

        if(user.password !== p) return alert("Ошибка");
        
        this.currentUser = user;
        this.showScreen(user.profile ? 'main-screen' : 'profile-screen');
        if(user.profile) this.render('passport');
    },

    saveProfile() {
        this.currentUser.profile = {
            last: document.getElementById('p-last').value,
            first: document.getElementById('p-first').value,
            date: document.getElementById('p-date').value,
            sign: document.getElementById('p-sign').value
        };
        this.save();
        this.showScreen('main-screen');
        this.render('passport');
    },

    showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    },

    tab(type, el) {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        this.render(type);
    },

    render(type) {
        const list = document.getElementById('docs-list');
        const docs = this.currentUser.docs.filter(d => d.type === type);
        list.innerHTML = '';

        if(docs.length === 0) {
            list.innerHTML = `<div class="glass-panel" onclick="App.createDoc('${type}')" style="text-align:center">+ Выпустить</div>`;
            return;
        }

        docs.forEach(doc => {
            const card = document.createElement('div');
            card.className = `card ${type}`;
            card.innerHTML = `
                <div class="card-label">ID: ${doc.id}</div>
                <div class="card-val">${this.currentUser.profile.last} ${this.currentUser.profile.first}</div>
                <div class="card-label">Родился</div>
                <div class="card-val">${this.currentUser.profile.date}</div>
                <div style="font-family:cursive; font-size:1.2rem; margin-top:10px">${this.currentUser.profile.sign}</div>
                <div class="qr-box"><canvas id="qrc-${doc.id}"></canvas></div>
            `;
            list.appendChild(card);
            // Важно: QR содержит только ID для поиска
            setTimeout(() => QRCode.toCanvas(document.getElementById(`qrc-${doc.id}`), doc.id, { width: 70, margin: 0 }), 50);
        });
    },

    createDoc(type) {
        const id = 'ID' + Math.random().toString(36).substr(2, 7).toUpperCase();
        this.currentUser.docs.push({ id, type });
        this.save();
        this.render(type);
    },

    // --- FIX SCANNER ---
    openScanner() {
        document.getElementById('scanner-view').style.display = 'flex';
        const scanner = new Html5Qrcode("reader");
        this.activeScanner = scanner;
        
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
            (decodedText) => {
                this.verify(decodedText);
                this.closeScanner();
            }
        ).catch(err => {
            alert("Ошибка камеры");
            this.closeScanner();
        });
    },

    closeScanner() {
        if(this.activeScanner) {
            this.activeScanner.stop().then(() => {
                document.getElementById('scanner-view').style.display = 'none';
            });
        }
    },

    verify(scannedId) {
        this.init(); // Обязательно подгружаем свежую базу перед проверкой!
        
        let found = null;
        let owner = null;

        // Глобальный поиск по ВСЕМ пользователям
        for(let u of this.db.users) {
            let doc = u.docs.find(d => d.id === scannedId);
            if(doc) {
                found = doc;
                owner = u;
                break;
            }
        }

        if(found) {
            alert(`✅ НАЙДЕН\nВладелец: ${owner.profile.last} ${owner.profile.first}\nТип: ${found.type}`);
        } else {
            alert(`❌ ОШИБКА: ID ${scannedId} отсутствует в системе.`);
        }
    }
};

// Запуск при старте
App.init();
</script>
</body>
</html>
